<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #333; }
        form { max-width: 480px; }
        label { display: block; margin-top: 14px; font-weight: bold; color: #555; }
        input[type="text"], input[type="email"] {
            width: 100%; padding: 8px 10px; margin-top: 6px;
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        .actions { margin-top: 24px; display: flex; gap: 12px; }
        button { padding: 9px 20px; background-color: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #357ab8; }
        a { padding: 9px 20px; background-color: #aaa; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1 th:text="${student.id} != null ? 'Edit Student' : 'Add Student'">Student Form</h1>

    <form th:action="@{/students/save}" th:object="${student}" method="post">
        <input type="hidden" th:field="*{id}" />

        <label for="firstName">First Name</label>
        <input type="text" id="firstName" th:field="*{firstName}" required />

        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" th:field="*{lastName}" required />

        <label for="email">Email</label>
        <input type="email" id="email" th:field="*{email}" required />

        <label for="course">Course</label>
        <input type="text" id="course" th:field="*{course}" required />

        <div class="actions">
            <button type="submit">Save</button>
            <a th:href="@{/students}">Cancel</a>
        </div>
    </form>
</body>
</html>
